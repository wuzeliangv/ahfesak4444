<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B8FFF"/>
      <stop offset="100%" stop-color="#2D5BFF"/>
    </linearGradient>
    <linearGradient id="thumb" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8efff"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Three slider tracks -->
  <g stroke="#ffffff" stroke-width="3" stroke-linecap="round" opacity="0.45" fill="none">
    <line x1="13" y1="22" x2="51" y2="22"/>
    <line x1="13" y1="32" x2="51" y2="32"/>
    <line x1="13" y1="42" x2="51" y2="42"/>
  </g>
  <!-- Slider thumbs at different positions (suggests "configurable / controlled") -->
  <g fill="url(#thumb)">
    <circle cx="22" cy="22" r="4.8"/>
    <circle cx="42" cy="32" r="4.8"/>
    <circle cx="30" cy="42" r="4.8"/>
  </g>
</svg>
